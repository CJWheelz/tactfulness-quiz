<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Facts Quiz</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f0;
      color: #1a1a1a;
      padding: 2rem 1rem 4rem;
    }

    .quiz-wrap {
      max-width: 680px;
      margin: 0 auto;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 15px;
      color: #666;
      margin-bottom: 2rem;
    }

    .question-card {
      background: #fff;
      border: 1px solid #e0e0d8;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
      transition: border-color 0.2s, background 0.2s;
    }

    .question-card.correct {
      border-color: #4a8c2a;
      background: #f0f9e8;
    }

    .question-card.wrong {
      border-color: #b03030;
      background: #fdf0f0;
    }

    .q-header {
      display: flex;
      gap: 10px;
      margin-bottom: 1rem;
    }

    .q-num {
      font-size: 12px;
      font-weight: 600;
      color: #999;
      min-width: 28px;
      padding-top: 2px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .q-text {
      font-size: 15px;
      line-height: 1.55;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-left: 38px;
    }

    .option-label {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border: 1px solid #e0e0d8;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      background: #fafaf8;
      transition: background 0.15s, border-color 0.15s;
      user-select: none;
    }

    .option-label:hover {
      background: #f0f0ea;
      border-color: #ccc;
    }

    .option-label input[type="radio"] {
      accent-color: #2a6cb0;
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .question-card.correct .option-label.selected {
      background: #d4edba;
      border-color: #4a8c2a;
      color: #1e4a0a;
      font-weight: 500;
    }

    .question-card.wrong .option-label.selected {
      background: #f9cccc;
      border-color: #b03030;
      color: #5a1010;
      font-weight: 500;
    }

    /* Map question */
    .images-row {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
      padding-left: 38px;
    }

    .map-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .map-placeholder {
      width: 100%;
      aspect-ratio: 4/3;
      background: #f0f0ea;
      border: 1px dashed #ccc;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #999;
    }

    .map-option-label {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid #e0e0d8;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      background: #fafaf8;
      width: 100%;
      transition: background 0.15s, border-color 0.15s;
      user-select: none;
    }

    .map-option-label:hover {
      background: #f0f0ea;
      border-color: #ccc;
    }

    .question-card.correct .map-option-label.selected {
      background: #d4edba;
      border-color: #4a8c2a;
      color: #1e4a0a;
      font-weight: 500;
    }

    .question-card.wrong .map-option-label.selected {
      background: #f9cccc;
      border-color: #b03030;
      color: #5a1010;
      font-weight: 500;
    }

    /* Submit area */
    .submit-area {
      margin-top: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .progress-text {
      font-size: 13px;
      color: #888;
    }

    .submit-btn {
      padding: 12px 48px;
      font-size: 15px;
      font-weight: 500;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    .submit-btn:hover:not(:disabled) {
      background: #333;
    }

    .submit-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .score-box {
      text-align: center;
      padding: 1.5rem 2.5rem;
      background: #fff;
      border: 1px solid #e0e0d8;
      border-radius: 12px;
      width: 100%;
    }

    .score-number {
      font-size: 40px;
      font-weight: 600;
    }

    .score-label {
      font-size: 15px;
      color: #666;
      margin-top: 6px;
    }

    .correct-answer-note {
      font-size: 13px;
      color: #b03030;
      font-weight: 500;
      margin-top: 10px;
      padding: 8px 12px;
      background: #fde8e8;
      border-radius: 6px;
      border-left: 3px solid #b03030;
    }
  </style>
</head>
<body>

<div class="quiz-wrap">
  <h1>How much do you know about the world?</h1>
  <p class="subtitle">Answer all 13 questions, then submit to see your score.</p>
  <div id="quiz"></div>
  <div class="submit-area">
    <p class="progress-text" id="progressText">0 of 13 answered</p>
    <button class="submit-btn" id="submitBtn" disabled onclick="submitQuiz()">Submit answers</button>
    <div id="scoreBox" class="score-box" style="display:none;">
      <div class="score-number" id="scoreNumber"></div>
      <div class="score-label" id="scoreLabel"></div>
    </div>
  </div>
</div>

<script>
  const questions = [
    {
      text: "How did the number of deaths per year from natural disasters change over the last hundred years?",
      options: ["More than doubled", "Remained about the same", "Decreased to less than half"],
      correct: 2
    },
    {
      text: "In low-income countries across the world in 2022, what share of girls went to school until at least age 11?",
      options: ["Around 20%", "Around 40%", "Around 60%"],
      correct: 2
    },
    {
      text: "There are roughly eight billion people in the world today. Which map best shows where they live? (Each figure represents 1 billion people.)",
      options: ["Map A", "Map B", "Map C"],
      correct: 1,
      isMap: true
    },
    {
      text: "How many of the world's 1-year-old children were vaccinated against some disease in 2024?",
      options: ["Around 25%", "Around 60%", "Around 85%"],
      correct: 2
    },
    {
      text: "How many people in the world have some access to electricity?",
      options: ["Around 30%", "Around 60%", "Around 90%"],
      correct: 2
    },
    {
      text: "In the last 20 years, the proportion of people living in extreme poverty has...",
      options: ["More than halved", "Remained more or less the same", "Almost doubled"],
      correct: 0
    },
    {
      text: "According to the United Nations, the world population will increase by another 2.4 billion people by 2100. The main reason is that there will be more…",
      options: ["Children (below age 15)", "Adults (age 15 to 74)", "Very old (above age 75)"],
      correct: 1
    },
    {
      text: "There are 2 billion children in the world today, aged 0–14 years old. How many children will there be in the year 2100 according to the United Nations?",
      options: ["4 billion", "3 billion", "2 billion"],
      correct: 2
    },
    {
      text: "Worldwide, men older than 25 have spent 8.9 years in school, on average. How many years have women of the same age spent in school?",
      options: ["2.4 years", "5.4 years", "8.4 years"],
      correct: 2
    },
    {
      text: "What is the life expectancy of the world population?",
      options: ["50 years", "60 years", "70 years"],
      correct: 2
    },
    {
      text: "Where does the majority of the world population live?",
      options: ["Low-income countries", "Middle-income countries", "High-income countries"],
      correct: 1
    },
    {
      text: "Tigers, Giant Pandas and Mountain Gorillas were listed as threatened species in 1996. Since then, have any of these species become more critically endangered?",
      options: ["None of them", "One of them", "Two of them"],
      correct: 0
    },
    {
      text: "The global climate experts believe that, over the next 100 years, the average temperature will:",
      options: ["Get warmer", "Remain the same", "Get colder"],
      correct: 0
    }
  ];

  const labels = ["A", "B", "C"];
  let answered = new Array(questions.length).fill(null);

  function buildQuiz() {
    const container = document.getElementById("quiz");
    questions.forEach((q, qi) => {
      const card = document.createElement("div");
      card.className = "question-card";
      card.id = "card-" + qi;

      const header = document.createElement("div");
      header.className = "q-header";
      header.innerHTML = `<span class="q-num">Q${qi + 1}</span><span class="q-text">${q.text}</span>`;
      card.appendChild(header);

      if (q.isMap) {
        const imagesRow = document.createElement("div");
        imagesRow.className = "images-row";
        ["image1", "image2", "image3"].forEach((imgName, i) => {
          const col = document.createElement("div");
          col.className = "map-col";
          col.innerHTML = `
            <img src="${imgName}.png" alt="Map ${labels[i]}" style="width:100%; aspect-ratio:4/3; object-fit:cover; border-radius:8px; border:1px solid #e0e0d8;" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
            <div class="map-placeholder" style="display:none;">${imgName}.png</div>
          `;
          imagesRow.appendChild(col);
        });
        card.appendChild(imagesRow);

        const mapOpts = document.createElement("div");
        mapOpts.className = "images-row";
        mapOpts.style.marginBottom = "0";
        q.options.forEach((opt, oi) => {
          const col = document.createElement("div");
          col.className = "map-col";
          const lbl = document.createElement("label");
          lbl.className = "map-option-label";
          lbl.id = `lbl-${qi}-${oi}`;
          lbl.innerHTML = `<input type="radio" name="q${qi}" value="${oi}" /> ${labels[oi]}`;
          lbl.querySelector("input").addEventListener("change", () => onAnswer(qi, oi));
          col.appendChild(lbl);
          mapOpts.appendChild(col);
        });
        card.appendChild(mapOpts);
      } else {
        const opts = document.createElement("div");
        opts.className = "options";
        q.options.forEach((opt, oi) => {
          const lbl = document.createElement("label");
          lbl.className = "option-label";
          lbl.id = `lbl-${qi}-${oi}`;
          lbl.innerHTML = `<input type="radio" name="q${qi}" value="${oi}" /> ${labels[oi]}: ${opt}`;
          lbl.querySelector("input").addEventListener("change", () => onAnswer(qi, oi));
          opts.appendChild(lbl);
        });
        card.appendChild(opts);
      }

      container.appendChild(card);
    });
  }

  function onAnswer(qi, oi) {
    answered[qi] = oi;
    const count = answered.filter(a => a !== null).length;
    document.getElementById("progressText").textContent = `${count} of ${questions.length} answered`;
    document.getElementById("submitBtn").disabled = count < questions.length;
  }

  function submitQuiz() {
    let score = 0;
    questions.forEach((q, qi) => {
      const card = document.getElementById("card-" + qi);
      const selected = answered[qi];
      const isCorrect = selected === q.correct;
      if (isCorrect) score++;
      card.classList.add(isCorrect ? "correct" : "wrong");

      const allInputs = card.querySelectorAll("input[type=radio]");
      allInputs.forEach(inp => inp.disabled = true);

      const selectedLabel = document.getElementById(`lbl-${qi}-${selected}`);
      if (selectedLabel) selectedLabel.classList.add("selected");

      if (!isCorrect) {
        const note = document.createElement("div");
        note.className = "correct-answer-note";
        const correctText = q.isMap ? `Map ${labels[q.correct]}` : `${labels[q.correct]}: ${q.options[q.correct]}`;
        note.textContent = `Correct answer: ${correctText}`;
        card.appendChild(note);
      }
    });

    const scoreBox = document.getElementById("scoreBox");
    document.getElementById("scoreNumber").textContent = `${score} / ${questions.length}`;
    const pct = Math.round((score / questions.length) * 100);
    let msg = "";
    if (pct === 100) msg = "Perfect score — outstanding!";
    else if (pct >= 80) msg = "Great result!";
    else if (pct >= 60) msg = "Not bad — the world is full of surprises.";
    else if (pct >= 40) msg = "Room to learn — the world may be better than you think!";
    else msg = "The world may be better than you think!";
    document.getElementById("scoreLabel").textContent = msg;
    scoreBox.style.display = "block";

    document.getElementById("submitBtn").disabled = true;
    scoreBox.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }

  buildQuiz();
</script>
</body>
</html>
